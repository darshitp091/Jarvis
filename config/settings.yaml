jarvis:
  name: JARVIS
  wake_word: hey jarvis
  wake_word_mode: auto
  user_name: Sir
  pin_enabled: false  # set true after first run

models:
  main_brain: qwen2.5-coder:7b
  vision: moondream:latest
  code: qwen2.5-coder:7b
  medical: qwen2.5-coder:7b
  safety: qwen2.5-coder:7b
  filler: qwen2.5-coder:7b
  embeddings: nomic-embed-text:latest
  science: qwen2.5-coder:7b

audio:
  sample_rate: 16000
  silence_threshold: 0.8     # seconds of silence to stop listening
  wake_word_sensitivity: 0.5

tts:
  engine: edge                    # Edge TTS (online)
  default_voice: hinglish         # Options: english, hinglish
  voices:
    english:
      ref_speaker: en-IN-NeerjaNeural
    hinglish:
      ref_speaker: hi-IN-SwaraNeural
  speaking_rate: 1.15             # 15% speed boost for natural human flow
  dsp:
    reverb_room_size: 0.15
    reverb_wet_level: 0.05
    reverb_dry_level: 0.95

ui:
  orb_size_idle: 80
  orb_size_listening: 120
  position: top_center
  always_on_top: true

memory:
  db_path: ./jarvis_brain/lancedb
  max_memories: 10000
  retrieve_top_k: 5
  memory_ttl_days: 90

spotify:
  client_id: "YOUR_SPOTIFY_CLIENT_ID"
  client_secret: "YOUR_SPOTIFY_CLIENT_SECRET"
  redirect_uri: "http://127.0.0.1:8888/callback"
  api_enabled: true

groq:
  api_key: "YOUR_GROQ_API_KEY"
  model: "llama-3.3-70b-versatile"

sarvam:
  api_key: "YOUR_SARVAM_API_KEY"
  enabled: false
  language: "hi-IN"
  tts_speaker: "kavya"

obsidian:
  vault_path: "C:\\Users\\patel\\Documents\\Obsidian Vault"
  daily_notes_folder: "Daily Notes"

mistral:
  api_key: "YOUR_MISTRAL_API_KEY"
  models:
    brain: "mistral-large-2512"
    code: "devstral-2512"
    vision: "ministral-8b-2512"
    reasoning: "magistral-medium-2509"
    summary: "open-mistral-nemo"

ofoxai:
  api_key: "YOUR_OFOXAI_API_KEY"
  model: "z-ai/glm-4.7-flash:free"

groww:
  api_key: "YOUR_GROWW_API_KEY"
  api_secret: "YOUR_GROWW_API_SECRET"

cloudflare:
  enabled: true
  account_id: "YOUR_CLOUDFLARE_ACCOUNT_ID"
  api_token: "YOUR_CLOUDFLARE_API_TOKEN"
  model: "@cf/meta/llama-3.1-8b-instruct"

