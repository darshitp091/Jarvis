jarvis:
  name: JARVIS
  wake_word: hey jarvis
  wake_word_mode: auto
  user_name: Sir
  pin_enabled: false  # set true after first run

models:
  main_brain: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest
  vision: moondream:latest
  code: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest
  medical: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest
  safety: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest
  filler: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest
  embeddings: nomic-embed-text:latest
  science: yasserrmd/Human-Like-Qwen2.5-1.5B-Instruct:latest

audio:
  sample_rate: 16000
  silence_threshold: 0.8     # seconds of silence to stop listening
  wake_word_sensitivity: 0.5

tts:
  voice_model: kokoro-v1.0.onnx  # Ensure model downloaded
  voices_json: voices-v1.0.bin       # Voices file for Kokoro
  default_voice: af_heart        # Default English voice
  speaking_rate: 1.25

ui:
  orb_size_idle: 80
  orb_size_listening: 120
  position: top_center
  always_on_top: true

memory:
  db_path: ./jarvis_brain/lancedb
  max_memories: 10000
  retrieve_top_k: 5
  memory_ttl_days: 90

spotify:
  client_id: "YOUR_SPOTIFY_CLIENT_ID"
  client_secret: "YOUR_SPOTIFY_CLIENT_SECRET"
  redirect_uri: "http://127.0.0.1:8888/callback"
  api_enabled: false

groq:
  api_key: "YOUR_GROQ_API_KEY"
  model: "llama-3.3-70b-versatile"

sarvam:
  api_key: "YOUR_SARVAM_API_KEY"
  enabled: true
  language: "hi-IN"
  tts_speaker: "shubh"

obsidian:
  vault_path: "C:\\Users\\patel\\Documents\\Obsidian Vault"
  daily_notes_folder: "Daily Notes"

mistral:
  api_key: "YOUR_MISTRAL_API_KEY"
  models:
    brain: "mistral-large-2512"
    code: "codestral-2405"
    vision: "ministral-8b-2512"

ofoxai:
  api_key: "YOUR_OFOXAI_API_KEY"
  model: "z-ai/glm-4.7-flash:free"
