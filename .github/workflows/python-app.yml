# GitHub Actions CI Workflow for JARVIS Voice & Vision Assistant
name: JARVIS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pyyaml loguru requests

    - name: Lint for Critical Syntax Errors
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=jarvis_env,venv,.git,scratch

    - name: Verify Core Imports & Intent Routing Engine
      run: |
        python -X utf8 -c "from core.intent_router import IntentRouter; router = IntentRouter(); print('✅ IntentRouter initialized successfully!')"

    - name: Verify File Manager & OneDrive Resolver Engine
      run: |
        python -X utf8 -c "from skills.file_manager import FileManager; fm = FileManager(); print('✅ FileManager & OneDrive Resolver initialized successfully!')"
